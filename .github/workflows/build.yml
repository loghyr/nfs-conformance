#
# build.yml -- CI: build and run the suite on Linux and macOS.
#
# Linux runs the portable tests against the GitHub runner's local
# filesystem (ext4 by default).  Tests that require features the
# runner does not have (reflink for op_clone, idmap for some
# ownership tests) SKIP rather than fail -- that is the designed
# behaviour.
#
# macOS exercises the compile-time skip stubs: every test compiles
# cleanly and reports SKIP at runtime for platform-gated features
# (O_DIRECT, O_TMPFILE, xattr, etc.).
#
# `make check` drives every test through `prove`; a mix of PASS +
# SKIP returns 0 and is the expected green state for CI.

name: build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install prove (Perl TAP harness)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y perl
      - name: make
        run: make
      - name: make check
        run: make check
